name: Build and Push to ACR

on:
  workflow_call:
    inputs:
      acr_name:
        description: "Azure Container Registry name"
        required: true
        type: string
      environment:
        description: "Environment (e.g., prd)"
        required: true
        type: string
      build_image:
        description: "Whether to build and push (false = use container_image)"
        required: true
        type: boolean
      container_image:
        description: "Pre-built image to use when build_image is false"
        required: false
        type: string
      git_sha:
        description: "Git SHA for image tag (defaults to github.sha)"
        required: false
        type: string
        default: ""
      next_public_app_url:
        description: "Override NEXT_PUBLIC_APP_URL (skips Azure query when set)"
        required: false
        type: string
        default: ""
    outputs:
      image_tag:
        description: "Full image reference (registry/repo:tag)"
        value: ${{ jobs.build-and-push.outputs.image_tag }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.set-output.outputs.image_tag }}

    steps:
      - name: Checkout repository
        if: ${{ inputs.build_image }}
        uses: actions/checkout@v6

      - name: Azure Login
        if: ${{ inputs.build_image }}
        uses: azure/login@v2
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: ${{ inputs.build_image }}
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Setup Docker Buildx
        if: ${{ inputs.build_image }}
        uses: docker/setup-buildx-action@v3

      - name: Get App URL for build
        if: ${{ inputs.build_image }}
        id: get-app-url
        env:
          FALLBACK_URL: ${{ vars.NEXT_PUBLIC_APP_URL || vars.APP_URL }}
        run: |
          if [ -n "${{ inputs.next_public_app_url }}" ]; then
            APP_URL="${{ inputs.next_public_app_url }}"
            echo "Using override URL: $APP_URL"
          elif DEFAULT_DOMAIN=$(az containerapp env show --name "inovy-env-${{ inputs.environment }}" --resource-group "rg-inovy-${{ inputs.environment }}" --query "properties.defaultDomain" -o tsv 2>/dev/null); then
            APP_URL="https://inovy-app-${{ inputs.environment }}.${DEFAULT_DOMAIN}"
            echo "Using Azure-derived URL: $APP_URL"
          elif [ -n "$FALLBACK_URL" ]; then
            APP_URL="$FALLBACK_URL"
            echo "Using fallback from env vars: $APP_URL"
          else
            echo "::error::Could not resolve NEXT_PUBLIC_APP_URL. Deploy infrastructure first (azure-infra.yml) or set NEXT_PUBLIC_APP_URL/APP_URL in the GitHub environment, or pass next_public_app_url to the workflow."
            exit 1
          fi
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        if: ${{ inputs.build_image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ inputs.acr_name }}.azurecr.io/inovy-app:${{ inputs.git_sha != '' && inputs.git_sha || github.sha }}
            ${{ inputs.acr_name }}.azurecr.io/inovy-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_PLATFORM=${{ vars.NEXT_PUBLIC_PLATFORM || 'azure' }}
            NEXT_PUBLIC_APP_URL=${{ steps.get-app-url.outputs.app_url }}
            NEXT_PUBLIC_WEBHOOK_URL=${{ vars.NEXT_PUBLIC_WEBHOOK_URL || '' }}
            NEXT_PUBLIC_KVK_NUMBER=${{ vars.NEXT_PUBLIC_KVK_NUMBER || '' }}

      - name: Set image tag output
        id: set-output
        run: |
          if [ "${{ inputs.build_image }}" == "true" ]; then
            echo "image_tag=${{ inputs.acr_name }}.azurecr.io/inovy-app:${{ inputs.git_sha != '' && inputs.git_sha || github.sha }}" >> $GITHUB_OUTPUT
          else
            if [ -z "${{ inputs.container_image }}" ]; then
              echo "Error: container_image must be provided when build_image is false"
              exit 1
            fi
            echo "image_tag=${{ inputs.container_image }}" >> $GITHUB_OUTPUT
          fi
