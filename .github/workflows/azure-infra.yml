name: Azure Infrastructure Inovy

permissions:
  id-token: write
  contents: read
  actions: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: string
        default: "prd"
      resource_group_name:
        description: "Resource group name for Terraform state storage"
        required: true
        type: string
        default: "rg-terraform-states"
      location:
        description: "Azure region for resources"
        required: true
        type: string
        default: "westeurope"
      terraform_unlock:
        description: "Optional: Lock ID to force-unlock Terraform state (use when state is locked)"
        required: false
        type: string

jobs:
  terraform-plan:
    if: ${{ inputs.environment == 'prd' }}
    environment: prd
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init and Validate
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="storage_account_name=sttf${{ inputs.environment }}inovy" \
            -backend-config="key=${{ inputs.environment }}.terraform.tfstate"
          terraform validate

      - name: Create terraform.tfvars from TF_VARS
        working-directory: infrastructure
        env:
          TF_VARS_B64: ${{ vars.TF_VARS }}
        run: |
          # Decode base64-encoded TF_VARS and write to terraform.tfvars file
          echo "$TF_VARS_B64" | base64 -d > terraform.tfvars
          echo "Created terraform.tfvars from decoded TF_VARS environment variable"

      - name: Import cron curl image to ACR
        working-directory: infrastructure
        run: |
          set -euo pipefail
          ACR_NAME=""
          if [ -f terraform.tfvars ]; then
            ACR_NAME=$(grep -E '^[[:space:]]*acr_name[[:space:]]*=' terraform.tfvars 2>/dev/null | sed -E 's/.*=[[:space:]]*"([^"]*)".*/\1/' | head -1 || true)
          fi
          if [ -z "${ACR_NAME// }" ]; then
            ACR_NAME="inovyacr$(echo '${{ inputs.environment }}' | tr -d '-')"
          fi
          echo "Importing curlimages/curl:8.5.0 into ACR: $ACR_NAME"
          set +e
          IMPORT_OUT=$(az acr import \
            --name "$ACR_NAME" \
            --source docker.io/curlimages/curl:8.5.0 \
            --image curlimages/curl:8.5.0 2>&1)
          IMPORT_RC=$?
          set -e
          if [ "$IMPORT_RC" -ne 0 ]; then
            if echo "$IMPORT_OUT" | grep -q 'already exists in target registry'; then
              echo "curl image tag already present in ACR; continuing"
            else
              echo "$IMPORT_OUT"
              exit 1
            fi
          fi

      - name: Terraform Force Unlock
        if: ${{ inputs.terraform_unlock != '' }}
        working-directory: infrastructure
        env:
          TF_UNLOCK_ID: ${{ inputs.terraform_unlock }}
        run: |
          echo "Force unlocking Terraform state with lock ID: $TF_UNLOCK_ID"
          terraform force-unlock -force "$TF_UNLOCK_ID"

      - name: Terraform Plan
        working-directory: infrastructure
        env:
          TF_VAR_postgresql_admin_login: ${{ secrets.POSTGRESQL_ADMIN_LOGIN }}
          TF_VAR_postgresql_admin_password: ${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_deepgram_api_key: ${{ secrets.DEEPGRAM_API_KEY }}
          TF_VAR_recall_api_key: ${{ secrets.RECALL_API_KEY }}
          TF_VAR_recall_webhook_secret: ${{ secrets.RECALL_WEBHOOK_SECRET }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_huggingface_api_key: ${{ secrets.HUGGINGFACE_API_KEY }}
          TF_VAR_oauth_encryption_key: ${{ secrets.OAUTH_ENCRYPTION_KEY }}
          TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
          TF_VAR_cron_secret: ${{ secrets.CRON_SECRET }}
          TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_microsoft_client_id: ${{ secrets.MICROSOFT_CLIENT_ID }}
          # Optional: empty string omits MICROSOFT_CLIENT_SECRET on the Container App (Graph federated-only). Hybrid sign-in still needs the secret.
          TF_VAR_microsoft_client_secret: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          TF_VAR_microsoft_entra_oauth_application_object_id: ${{ vars.MICROSOFT_ENTRA_OAUTH_APPLICATION_OBJECT_ID }}
          TF_VAR_next_public_webhook_url: ${{ secrets.NEXT_PUBLIC_WEBHOOK_URL }}
          TF_VAR_next_public_kvk_number: ${{ secrets.NEXT_PUBLIC_KVK_NUMBER }}
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var="environment=${{ inputs.environment }}" \
            -var="location=${{ inputs.location }}" \
            -var="entra_tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -var-file=terraform.tfvars

      - name: Upload Plan to Storage Account
        run: |
          STORAGE_ACCOUNT_NAME="sttf${{ inputs.environment }}inovy"
          PLAN_FILE="infrastructure/tfplan"
          PLAN_BLOB_NAME="${{ inputs.environment }}/tfplan"

          if [ -f "$PLAN_FILE" ]; then
            echo "Uploading plan file to storage account..."
            az storage blob upload \
              --account-name "$STORAGE_ACCOUNT_NAME" \
              --container-name tfstate \
              --name "$PLAN_BLOB_NAME" \
              --file "$PLAN_FILE" \
              --auth-mode login \
              --overwrite
            echo "Plan file uploaded successfully: $PLAN_BLOB_NAME"
          else
            echo "ERROR: Plan file not found at $PLAN_FILE"
            exit 1
          fi

  terraform-apply:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: terraform-plan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v3
        with:
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.6.0"

      - name: Create terraform.tfvars from TF_VARS
        working-directory: infrastructure
        env:
          TF_VARS_B64: ${{ vars.TF_VARS }}
        run: |
          echo "$TF_VARS_B64" | base64 -d > terraform.tfvars
          echo "Created terraform.tfvars from decoded TF_VARS environment variable"

      - name: Import cron curl image to ACR
        working-directory: infrastructure
        run: |
          set -euo pipefail
          ACR_NAME=""
          if [ -f terraform.tfvars ]; then
            ACR_NAME=$(grep -E '^[[:space:]]*acr_name[[:space:]]*=' terraform.tfvars 2>/dev/null | sed -E 's/.*=[[:space:]]*"([^"]*)".*/\1/' | head -1 || true)
          fi
          if [ -z "${ACR_NAME// }" ]; then
            ACR_NAME="inovyacr$(echo '${{ inputs.environment }}' | tr -d '-')"
          fi
          echo "Importing curlimages/curl:8.5.0 into ACR: $ACR_NAME"
          set +e
          IMPORT_OUT=$(az acr import \
            --name "$ACR_NAME" \
            --source docker.io/curlimages/curl:8.5.0 \
            --image curlimages/curl:8.5.0 2>&1)
          IMPORT_RC=$?
          set -e
          if [ "$IMPORT_RC" -ne 0 ]; then
            if echo "$IMPORT_OUT" | grep -q 'already exists in target registry'; then
              echo "curl image tag already present in ACR; continuing"
            else
              echo "$IMPORT_OUT"
              exit 1
            fi
          fi

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="storage_account_name=sttf${{ inputs.environment }}inovy" \
            -backend-config="key=${{ inputs.environment }}.terraform.tfstate"

      - name: Download Plan from Storage Account
        run: |
          STORAGE_ACCOUNT_NAME="sttf${{ inputs.environment }}inovy"
          PLAN_FILE="infrastructure/tfplan"
          PLAN_BLOB_NAME="${{ inputs.environment }}/tfplan"

          echo "Downloading plan file from storage account..."
          if az storage blob download \
            --account-name "$STORAGE_ACCOUNT_NAME" \
            --container-name tfstate \
            --name "$PLAN_BLOB_NAME" \
            --file "$PLAN_FILE" \
            --auth-mode login 2>/dev/null; then
            echo "Plan file downloaded successfully"
          else
            echo "ERROR: Plan file not found in storage account. Plan job must complete successfully first."
            exit 1
          fi

      - name: Terraform Apply
        working-directory: infrastructure
        run: |
          if [ -f "tfplan" ]; then
            echo "Applying plan from saved tfplan file..."
            terraform apply -auto-approve tfplan 
          else
            echo "ERROR: Plan file not found. Cannot apply without a plan."
            exit 1
          fi
        env:
          TF_VAR_postgresql_admin_login: ${{ secrets.POSTGRESQL_ADMIN_LOGIN }}
          TF_VAR_postgresql_admin_password: ${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_deepgram_api_key: ${{ secrets.DEEPGRAM_API_KEY }}
          TF_VAR_recall_api_key: ${{ secrets.RECALL_API_KEY }}
          TF_VAR_recall_webhook_secret: ${{ secrets.RECALL_WEBHOOK_SECRET }}
          TF_VAR_resend_api_key: ${{ secrets.RESEND_API_KEY }}
          TF_VAR_huggingface_api_key: ${{ secrets.HUGGINGFACE_API_KEY }}
          TF_VAR_oauth_encryption_key: ${{ secrets.OAUTH_ENCRYPTION_KEY }}
          TF_VAR_better_auth_secret: ${{ secrets.BETTER_AUTH_SECRET }}
          TF_VAR_cron_secret: ${{ secrets.CRON_SECRET }}
          TF_VAR_resend_from_email: ${{ secrets.RESEND_FROM_EMAIL }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_microsoft_client_id: ${{ secrets.MICROSOFT_CLIENT_ID }}
          # Optional: empty string omits MICROSOFT_CLIENT_SECRET on the Container App (Graph federated-only). Hybrid sign-in still needs the secret.
          TF_VAR_microsoft_client_secret: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          TF_VAR_microsoft_entra_oauth_application_object_id: ${{ vars.MICROSOFT_ENTRA_OAUTH_APPLICATION_OBJECT_ID }}
          TF_VAR_next_public_webhook_url: ${{ secrets.NEXT_PUBLIC_WEBHOOK_URL }}
          TF_VAR_next_public_kvk_number: ${{ secrets.NEXT_PUBLIC_KVK_NUMBER }}
